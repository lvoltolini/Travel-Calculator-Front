<div class="converter-card">
  <h3>Screen Size Calculator</h3>
  
  <div class="input-group">
    <label>Diagonal</label>
    <input type="number" [(ngModel)]="diag" title="Diagonal Value" aria-label="Diagonal Value">    
    <select [(ngModel)]="diagInInches" title="Input Value" (change)="calculateXandY()">
      <option [ngValue]="true">Inches (")</option>
      <option [ngValue]="false">Centimeters (cm)</option>
    </select>
  </div>

  <div class="input-group">
    <label>Aspect Ratio (Width / Height)</label>
    <input type="number" step="0.01" [(ngModel)]="disp" title="Aspect Ratio" (input)="calculateXandY()">
    <small>e.g., 1.77 for 16:9, 1.33 for 4:3</small>
  </div>

  <hr>

  <div class="results-panel" *ngIf="results.x > 0">
    <div class="result-item">
      <strong>Width (x):</strong> {{ results.x }} cm
    </div>
    <div class="result-item">
      <strong>Height (y):</strong> {{ results.y }} cm
    </div>
  </div>
