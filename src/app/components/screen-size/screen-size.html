<div class="p-2">
  <!-- Unit Toggle (Shared by all) -->
  <div class="form-floating mb-3">
    <select class="form-select" id="mainUnitSelect" [(ngModel)]="diagInInches">
      <option [ngValue]="true">Inches (")</option>
      <option [ngValue]="false">Centimeters (cm)</option>
    </select>
    <label for="mainUnitSelect">Diagonal Input/Output Unit</label>
  </div>

  <div class="accordion accordion-flush border rounded" id="calcModesAccordion">
    
    <!-- Mode 1: Diag + Ratio -->
    <div class="accordion-item">
      <h2 class="accordion-header">
        <button class="accordion-button" type="button" data-bs-toggle="collapse" data-bs-target="#mode1">
          Diagonal + Aspect Ratio
        </button>
      </h2>
      <div id="mode1" class="accordion-collapse collapse show" data-bs-parent="#calcModesAccordion">
        <div class="accordion-body">
          <div class="row g-2">
            <div class="col-8 offset-2">
                <div class="form-floating mb-2">
                    <input title="Diagonal in centimeters" type="number" class="form-control" [(ngModel)]="diag" (input)="calculateFromDiagDisp()">
                    <label>Diagonal</label>
                </div>
                <div class="form-floating">
                    <input title="Aspect ratio (e.g. 1.77 for 16:9)" type="number" class="form-control" [(ngModel)]="disp" (input)="calculateFromDiagDisp()">
                    <label>Aspect Ratio (e.g. 1.77)</label>
                </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Mode 2: Width + Height -->
    <div class="accordion-item">
      <h2 class="accordion-header">
        <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#mode2">
          Width + Height
        </button>
      </h2>
      <div id="mode2" class="accordion-collapse collapse" data-bs-parent="#calcModesAccordion">
        <div class="accordion-body">
          <div class="row g-2">
            <div class="col-6"><div class="form-floating"><input title="Width in centimeters" type="number" class="form-control" [(ngModel)]="width" (input)="calculateFromXY()"><label>Width (cm)</label></div></div>
            <div class="col-6"><div class="form-floating"><input title="Height in centimeters" type="number" class="form-control" [(ngModel)]="height" (input)="calculateFromXY()"><label>Height (cm)</label></div></div>
          </div>
        </div>
      </div>
    </div>

    <!-- Mode 3: Width + Diagonal -->
    <div class="accordion-item">
      <h2 class="accordion-header">
        <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#mode3">
          Width + Diagonal
        </button>
      </h2>
      <div id="mode3" class="accordion-collapse collapse" data-bs-parent="#calcModesAccordion">
        <div class="accordion-body">
          <div class="row g-2">
            <div class="col-6"><div class="form-floating"><input title="Width in centimeters" type="number" class="form-control" [(ngModel)]="width" (input)="calculateFromXDiag()"><label>Width (cm)</label></div></div>
            <div class="col-6"><div class="form-floating"><input title="Diagonal in centimeters" type="number" class="form-control" [(ngModel)]="diag" (input)="calculateFromXDiag()"><label>Diagonal</label></div></div>
          </div>
        </div>
      </div>
    </div>

    <!-- Mode 4: Width + Ratio -->
    <div class="accordion-item">
      <h2 class="accordion-header">
        <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#mode4">
          Width + Aspect Ratio
        </button>
      </h2>
      <div id="mode4" class="accordion-collapse collapse" data-bs-parent="#calcModesAccordion">
        <div class="accordion-body">
          <div class="row g-2">
            <div class="col-6"><div class="form-floating"><input title="Width in centimeters" type="number" class="form-control" [(ngModel)]="width" (input)="calculateFromXDisp()"><label>Width (cm)</label></div></div>
            <div class="col-6"><div class="form-floating"><input title="Aspect ratio (e.g. 1.77 for 16:9)" type="number" class="form-control" [(ngModel)]="disp" (input)="calculateFromXDisp()"><label>Aspect Ratio</label></div></div>
          </div>
        </div>
      </div>
    </div>

  </div>

  <!-- Unified Results Panel -->
  <div class="mt-4 p-3 bg-primary-subtle rounded border border-primary shadow-sm" *ngIf="results.diagonal > 0">
    <h6 class="text-primary text-uppercase fw-bold mb-3">Calculated Metrics</h6>
    <div class="row g-3">
        <div class="col-6">
            <small class="d-block text-muted">Width (x)</small>
            <span class="fs-5 fw-bold">{{ results.x }} cm</span>
        </div>
        <div class="col-6">
            <small class="d-block text-muted">Height (y)</small>
            <span class="fs-5 fw-bold">{{ results.y }} cm</span>
        </div>
        <div class="col-6">
            <small class="d-block text-muted">Diagonal</small>
            <span class="fs-5 fw-bold">{{ results.diagonal }} {{ diagInInches ? '"' : 'cm' }}</span>
        </div>
        <div class="col-6">
            <small class="d-block text-muted">Aspect Ratio</small>
            <span class="fs-5 fw-bold">{{ results.disp }}</span>
        </div>
    </div>
  </div>
</div>
